<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT RAG — Chat with any video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">

      <!-- Branding -->
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="6,4 20,12 6,20" fill="white"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">YT RAG</div>
          <div class="brand-sub">Chat with any video</div>
        </div>
      </div>

      <!-- URL input -->
      <div class="url-section">
        <div class="url-input-wrap">
          <svg class="url-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <input id="url-input" type="text" placeholder="Paste a YouTube URL..." autocomplete="off" />
        </div>
        <button id="add-btn" class="add-btn">
          <span class="add-btn-label">Add video</span>
          <span class="add-btn-spinner" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
          </span>
        </button>
        <div id="add-error" class="add-error" hidden></div>
      </div>

      <!-- Library -->
      <div class="library-section">
        <div class="library-header">
          <span class="library-label">LIBRARY</span>
          <span id="video-count" class="video-count-badge">0</span>
        </div>
        <div id="video-list" class="video-list">
          <div class="library-empty">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 7V5a2 2 0 0 0-4 0v2"/>
              <line x1="12" y1="12" x2="12" y2="16"/>
              <line x1="10" y1="14" x2="14" y2="14"/>
            </svg>
            <p>No videos yet</p>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="sidebar-footer">
        <button id="reset-btn" class="clear-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
          Clear knowledge base
        </button>
      </div>
    </aside>

    <!-- ===== MAIN CHAT ===== -->
    <main class="chat-main">

      <!-- Header -->
      <header class="chat-header">
        <span class="chat-header-title">Conversation</span>
      </header>

      <!-- Messages -->
      <div id="messages" class="messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2 class="empty-heading">Ask anything about your videos</h2>
          <p class="empty-sub">Add a YouTube URL on the left, then ask a question below.</p>
        </div>
      </div>

      <!-- Chat input -->
      <div class="composer-wrap">
        <div class="composer">
          <textarea
            id="question"
            rows="1"
            placeholder="Ask a question about your indexed videos..."
          ></textarea>
          <button id="send-btn" class="send-btn" title="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="composer-hint">Press Enter to send · Shift+Enter for newline</p>
      </div>
    </main>
  </div>

  <!-- Delete confirmation modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        </svg>
      </div>
      <h3 class="modal-title">Remove video?</h3>
      <p id="modal-text" class="modal-sub"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-cancel-btn">Cancel</button>
        <button id="modal-confirm" class="modal-confirm-btn">Remove</button>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
